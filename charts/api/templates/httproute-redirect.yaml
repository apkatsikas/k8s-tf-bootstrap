# This HTTPRoute is parented directly to the Gateway (not the ListenerSet) so that
# it is always Accepted regardless of TLS certificate state. This gives external-dns
# a stable source to create the A record from on a fresh cluster, breaking the
# chicken-and-egg cycle where the ListenerSet cannot become Accepted without a cert,
# and the ACME challenge cannot complete without a DNS record.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-redirect
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - name: gateway
    namespace: envoy-gateway-system
    sectionName: http
  hostnames:
  - {{ .Values.hostname }}
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
