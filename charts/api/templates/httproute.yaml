apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - kind: ListenerSet
    name: api
    namespace: {{ .Values.namespace }}
  hostnames:
  - {{ .Values.hostname }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: api
      port: 80
