apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - kind: ListenerSet
    name: api
    namespace: {{ .Values.namespace }}
    # # restrict to the https listener so the http listener
    # # can handle the HTTP→HTTPS redirect independently. Without sectionName the
    # # route binds to all listeners and wins over the redirect on port 80.
    # sectionName: https
  hostnames:
  - {{ .Values.hostname }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: api
      port: 80
