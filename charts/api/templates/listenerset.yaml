apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: api
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.certIssuer.name }}
spec:
  parentRef:
    name: gateway
    namespace: envoy-gateway-system
  listeners:
    - name: api
      hostname: {{ .Values.hostname }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: api-tls
      allowedRoutes:
        namespaces:
          from: Same
    # TODO - remove once we can use 1.21 https://cert-manager.io/docs/releases/#upcoming-releases
    # and can remove http listener from ListenerSet in favor of annotation acme.cert-manager.io/http01-parentreffallback: "true"
    # on ListenerSet and 80 on Gateway
    - name: solver
      hostname: {{ .Values.hostname }}
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same      
