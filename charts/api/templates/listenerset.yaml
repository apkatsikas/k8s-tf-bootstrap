apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: api
  namespace: {{ .Values.namespace }}
  annotations:
    acme.cert-manager.io/http01-parentref-fallback: "true"
    cert-manager.io/cluster-issuer: {{ .Values.certIssuer.name }}
spec:
  parentRef:
    name: gateway
    namespace: envoy-gateway-system
  listeners:
    - name: api
      hostname: {{ .Values.hostname }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: api-tls
      allowedRoutes:
        namespaces:
          from: Same
