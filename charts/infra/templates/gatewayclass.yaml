apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
{{- if .Values.kind }}
  # KIND: points to the EnvoyProxy that patches hostPorts for local access.
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: kind-proxy
    namespace: envoy-gateway-system
{{- end }}
  # On GKE no parametersRef is needed — Envoy Gateway auto-provisions a
  # LoadBalancer Service and GKE assigns a dynamic IP. external-dns picks up
  # the IP from the Gateway status and creates the DNS record automatically.
